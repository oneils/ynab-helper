{{define "title"}}Import History{{end}} {{define "main"}}
<div class="page-header">
    <h2>Import History</h2>
    <p class="page-description">View and manage your imported bank transactions</p>
</div>

<div class="budget-acct-bar">
    <div class="form-group">
        <label for="budget-filter">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                <line x1="12" y1="22.08" x2="12" y2="12"></line>
            </svg>
            Budget
        </label>
        <select
            name="budget"
            id="budget-filter"
            hx-get="/accounts"
            hx-target="#accounts-select"
            hx-swap="outerHTML"
            required
        >
            <option value="">Select Budget...</option>
            {{range .Budgets}}
            <option value="{{.ID}}" {{if eq $.SelectedBudget .ID}}selected{{end}}>{{.Name}}</option>
            {{end}}
        </select>
    </div>

    {{template "accounts-select" .}}


</div>

<div class="txn-split-layout">
    <div class="txn-list-panel">
        <div id="txn-list-panel">
            {{template "bank-transactions" .}}
        </div>
    </div>
    <div id="txn-detail-panel" class="txn-detail-panel">
        <div class="txn-panel-placeholder">
            <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
            <h3>No transaction selected</h3>
            <p>Click any row to review details and send to YNAB</p>
        </div>
    </div>
</div>

<script>
(function () {
    var panel = document.getElementById('txn-detail-panel');
    var placeholder = panel ? panel.innerHTML : '';

    window.closeTxnDetail = function () {
        var p = document.getElementById('txn-detail-panel');
        if (!p) return;
        p.classList.remove('txn-detail-panel--open');
        p.innerHTML = placeholder;
        document.querySelectorAll('.txn-row--selected').forEach(function (el) {
            el.classList.remove('txn-row--selected');
        });
    };
})();
</script>
{{end}}

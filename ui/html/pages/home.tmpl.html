{{define "title"}}Import from Bank{{end}} {{define "main"}}
<div class="page-header">
    <h2>Import from Bank</h2>
    <p class="page-description">Import transactions from your bank statement</p>
</div>

<section id="upload-bank-txns" class="import-section">
    <form
        id="upload-bank-txns-form"
        hx-post="/preview-bank-txns"
        hx-boost="true"
        hx-swap="outerHTML"
        hx-target="#transactions"
        hx-encoding="multipart/form-data"
        hx-trigger="submit"
    >
        <!-- Form fields -->
        <div class="form-grid">
            <div class="form-group">
                <label for="budget">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="16"
                        height="16"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <path
                            d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"
                        ></path>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                        <line x1="12" y1="22.08" x2="12" y2="12"></line>
                    </svg>
                    Select Budget
                </label>
                <select name="budget" id="budget" hx-get="/accounts" hx-include="[name='account']" hx-target="#accounts-select" required>
                    <option value="">Select...</option>
                    {{range .Budgets}}
                    <option value="{{.ID}}">{{.Name}}</option>
                    {{end}}
                </select>
            </div>

            {{template "accounts-select" .}}
        </div>

        <!-- File upload area -->
        <div class="file-upload-area">
            <label for="file" class="file-upload-label">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="48"
                    height="48"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <span class="file-upload-title">Bank Report File</span>
                <span class="file-upload-hint">Click to choose file or drag and drop</span>
                <span class="file-upload-types">CSV, XLS, XLSX files</span>
                <input type="file" id="file" name="txn-file" accept=".csv,.xls,.xlsx" required />
            </label>
            <div id="file-name" class="file-name-display"></div>
        </div>

        <!-- Progress bar -->
        <div class="progress-container" style="display: none">
            <progress id="progress" value="0" max="100"></progress>
            <span class="progress-text">Uploading...</span>
        </div>

        <!-- Submit button -->
        <button id="upload-txns-btn" type="submit" class="submit-button">
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
            >
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            Upload Transactions
        </button>
    </form>
</section>

<div id="transactions"></div>

<script>
    // Show selected file name
    document.getElementById("file").addEventListener("change", function (e) {
        const fileName = e.target.files[0]?.name;
        const fileNameDisplay = document.getElementById("file-name");
        if (fileName) {
            fileNameDisplay.textContent = "📄 " + fileName;
            fileNameDisplay.style.display = "block";
        } else {
            fileNameDisplay.style.display = "none";
        }
    });

    // Show progress bar on submit
    document.getElementById("upload-bank-txns-form").addEventListener("submit", function () {
        document.querySelector(".progress-container").style.display = "block";
    });
</script>
{{end}}
